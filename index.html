<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tea Lover Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #2e3d2f;
      --text: #f5f5dc;
      --card: rgba(255,255,255,0.1);
      --accent: #a3c585;
    }

    body.light {
      --bg: #fdf6e3;
      --text: #3b2f2f;
      --card: rgba(0,0,0,0.05);
      --accent: #6b8e23;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

    body {
      background: var(--bg);
      color: var(--text);
      transition: 0.4s;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 50px;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(10px);
    }

    header h1 { color: var(--accent); }

    nav a {
      margin: 0 15px;
      text-decoration: none;
      color: var(--text);
    }

    .toggle-btn {
      padding: 8px 15px;
      background: var(--accent);
      border: none;
      border-radius: 20px;
      cursor: pointer;
    }

    section {
      padding: 80px 50px;
      text-align: center;
    }

    .hero {
      height: 90vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .hero h2 {
      font-size: 45px;
    }

    .typing {
      color: var(--accent);
      border-right: 2px solid;
      animation: blink 0.7s infinite;
    }

    @keyframes blink {
      50% { border-color: transparent; }
    }

    .tea-icon {
      font-size: 50px;
      margin-bottom: 20px;
    }

    .projects {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: var(--card);
      padding: 20px;
      border-radius: 15px;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-10px);
      box-shadow: 0 0 20px var(--accent);
    }

    footer {
      text-align: center;
      padding: 20px;
      background: rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>

<header>
  <h1>🍃 Tea Lover</h1>
  <nav>
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#projects">Tea Collection</a>
    <a href="#contact">Contact</a>
  </nav>
  <button class="toggle-btn" onclick="toggleMode()">🌙</button>
</header>

<section class="hero" id="home">
  <div class="tea-icon">☕</div>
  <h2>I'm <span class="typing"></span></h2>
  <p>Tea Enthusiast | Nature Lover | Creator</p>
</section>

<section id="about">
  <h2>About Me</h2>
  <p>I love tea, calm vibes, and creating beautiful things inspired by nature 🍃</p>
</section>

<section id="projects">
  <h2>My Tea Collection</h2>
  <div class="projects">
    <div class="card">Green Tea 🍵</div>
    <div class="card">Masala Tea ☕</div>
    <div class="card">Herbal Tea 🌿</div>
  </div>
</section>

<section id="contact">
  <h2>Contact Me</h2>
  <p>Email: tea@email.com</p>
</section>

<footer>
  <p>🍃 Made with Love & Tea</p>
</footer>

<script>
  function toggleMode() {
    document.body.classList.toggle('light');
  }

  const text = ["Tea Lover", "Chai Addict", "Nature Soul"];
  let count = 0;
  let index = 0;
  let currentText = '';
  let letter = '';

  (function type() {
    if (count === text.length) count = 0;
    currentText = text[count];
    letter = currentText.slice(0, ++index);
    document.querySelector('.typing').textContent = letter;

    if (letter.length === currentText.length) {
      count++;
      index = 0;
      setTimeout(type, 1000);
    } else {
      setTimeout(type, 100);
    }
  })();
</script>

</body>
</html>
