<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>vigneshwaran </title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #1f1c2c;
      --text: white;
      --card: rgba(255,255,255,0.1);
    }

    body.light {
      --bg: #f5f5f5;
      --text: #111;
      --card: rgba(0,0,0,0.05);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

    body {
      background: var(--bg);
      color: var(--text);
      transition: 0.4s;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 50px;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(10px);
    }

    header h1 { color: #00f7ff; }

    nav a {
      margin: 0 15px;
      text-decoration: none;
      color: var(--text);
    }

    .toggle-btn {
      padding: 8px 15px;
      background: #00f7ff;
      border: none;
      border-radius: 20px;
      cursor: pointer;
    }

    section {
      padding: 80px 50px;
      text-align: center;
    }

    .hero {
      height: 90vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .typing {
      color: #00f7ff;
      border-right: 2px solid;
      animation: blink 0.7s infinite;
    }

    @keyframes blink {
      50% { border-color: transparent; }
    }

    .projects {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: var(--card);
      padding: 20px;
      border-radius: 15px;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-10px);
      box-shadow: 0 0 20px #00f7ff;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>

<header>
  <h1>Aswin Raj</h1>
  <nav>
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#projects">Projects</a>
    <a href="#contact">Contact</a>
  </nav>
  <button class="toggle-btn" onclick="toggleMode()">🌙</button>
</header>

<section class="hero" id="home">
  <h2>Hello, I'm <span class="typing"></span></h2>
  <p>Web Developer | Designer | Student</p>
</section>

<section id="about">
  <h2>About Me</h2>
  <p>I am Aswin Raj, a passionate web developer.</p>
</section>

<section id="projects">
  <h2>My Projects</h2>
  <div class="projects">
    <div class="card">Project 1</div>
    <div class="card">Project 2</div>
    <div class="card">Project 3</div>
  </div>
</section>

<section id="contact">
  <h2>Contact Me</h2>
  <p>Email: aswin@email.com</p>
</section>

<footer>
  <p>© 2026 Aswin Raj</p>
</footer>

<script>
  function toggleMode() {
    document.body.classList.toggle('light');
  }

  const text = ["Aswin Raj", "Web Developer", "Designer"];
  let count = 0;
  let index = 0;
  let currentText = '';
  let letter = '';

  (function type() {
    if (count === text.length) count = 0;
    currentText = text[count];
    letter = currentText.slice(0, ++index);
    document.querySelector('.typing').textContent = letter;

    if (letter.length === currentText.length) {
      count++;
      index = 0;
      setTimeout(type, 1000);
    } else {
      setTimeout(type, 100);
    }
  })();
</script>

</body>
</html>
